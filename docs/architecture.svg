  <!-- ═══════════════════════════════ COMPLIANCE STRIP ═══════════════════════ -->
  <rect x="90" y="855" width="920" height="30" rx="6" fill="#f1f8e9" stroke="#689f38" stroke-width="1.2"/>
  <text x="550" y="875" text-anchor="middle" font-size="9.5" fill="#33691e">
    Compliance: DPDP Act 2023 · NDHM Health Data Management Policy · ICMR Ethical Guidelines · CDSCO Schedule Y · CERT-In
  </text>

