  <text x="621" y="710" text-anchor="middle" font-size="8.5" fill="#ad1457">append-only · actorId · action</text>
  <text x="621" y="723" text-anchor="middle" font-size="8.5" fill="#ad1457">entityType · timestamp</text>

  <rect x="734" y="676" width="265" height="50" rx="5" fill="#fce8ef" stroke="#e91e63" stroke-width="1"/>
  <text x="866" y="695" text-anchor="middle" font-size="10" font-weight="700" fill="#880e4f">guidelineprofiles</text>
  <text x="866" y="710" text-anchor="middle" font-size="8.5" fill="#ad1457">versioned scoring rules</text>
  <text x="866" y="723" text-anchor="middle" font-size="8.5" fill="#ad1457">requiredFields · scoringWeights</text>

  <!-- ═══════════════════════════════ PRODUCTION TARGET ══════════════════════ -->
  <rect x="90" y="755" width="920" height="90" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="200" y="774" text-anchor="middle" font-size="10" font-weight="700" fill="#0d47a1">Production Target</text>
  <text x="200" y="789" text-anchor="middle" font-size="8.5" fill="#1565c0">(planned — Stage 2)</text>

  <rect x="108" y="778" width="145" height="58" rx="5" fill="#e8f5fd" stroke="#1976d2" stroke-width="1"/>
