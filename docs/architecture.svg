  <text x="205" y="710" text-anchor="middle" font-size="8.5" fill="#ad1457">immutable · extractedFields</text>
  <text x="205" y="723" text-anchor="middle" font-size="8.5" fill="#ad1457">scoreSnapshots · ragChunks</text>

  <rect x="318" y="676" width="190" height="50" rx="5" fill="#fce8ef" stroke="#e91e63" stroke-width="1"/>
