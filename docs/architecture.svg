  <rect x="588" y="778" width="145" height="58" rx="5" fill="#e8f5fd" stroke="#1976d2" stroke-width="1"/>
  <text x="660" y="796" text-anchor="middle" font-size="9" font-weight="700" fill="#0d47a1">Token Vault</text>
