  <text x="180" y="811" text-anchor="middle" font-size="8" fill="#1565c0">Tesseract 5</text>
  <text x="180" y="824" text-anchor="middle" font-size="8" fill="#1565c0">PaddleOCR / TrOCR</text>

  <rect x="268" y="778" width="145" height="58" rx="5" fill="#e8f5fd" stroke="#1976d2" stroke-width="1"/>
  <text x="340" y="796" text-anchor="middle" font-size="9" font-weight="700" fill="#0d47a1">NLP Workers</text>
  <text x="340" y="811" text-anchor="middle" font-size="8" fill="#1565c0">Presidio + scispaCy</text>
